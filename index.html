<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Antigravity 3D Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <style>
      body {
        background: #000;
        color: #fff;
        overflow-x: hidden;
        font-family: sans-serif;
      }

      /* Контейнер для 3D */
      .viewport {
        perspective: 1000px; /* Глубина 3D */
        height: 100vh;
        width: 100%;
        position: sticky;
        top: 0;
        overflow: hidden;
      }

      .scene {
        transform-style: preserve-3d;
        width: 100%;
        height: 100%;
        position: relative;
      }

      .gadget {
        position: absolute;
        transform-style: preserve-3d;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div style="height: 500vh">
      <div class="viewport">
        <div class="scene">
          <div
            class="main-text absolute inset-0 flex items-center justify-center text-center"
          >
            <h1
              class="text-[10vw] font-black leading-none uppercase tracking-tighter"
            >
              AERIS<br /><span class="opacity-20">ANTIGRAVITY</span>
            </h1>
          </div>

          <div
            class="gadget w-64 h-80"
            style="top: 20%; left: 10%; transform: translateZ(-1500px)"
          >
            Gadget 01
          </div>
          <div
            class="gadget w-80 h-48"
            style="top: 50%; right: 5%; transform: translateZ(-2500px)"
          >
            Gadget 02
          </div>
          <div
            class="gadget w-40 h-40 rounded-full"
            style="top: 70%; left: 20%; transform: translateZ(-1000px)"
          >
            Nexus
          </div>
          <div
            class="gadget w-56 h-72"
            style="top: 10%; right: 20%; transform: translateZ(-3500px)"
          >
            Sensor
          </div>
          <div
            class="gadget w-96 h-96"
            style="top: 40%; left: 40%; transform: translateZ(-5000px)"
          >
            Core Unit
          </div>
        </div>
      </div>
    </div>

    <script>
      // Плавный скролл
      const lenis = new Lenis();
      function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
      }
      requestAnimationFrame(raf);

      gsap.registerPlugin(ScrollTrigger);

      // АНИМАЦИЯ ПОЛЕТА СКВОЗЬ ЭЛЕМЕНТЫ
      gsap.to(".scene", {
        z: 5000, // Двигаем всю сцену на камеру
        ease: "none",
        scrollTrigger: {
          trigger: "body",
          start: "top top",
          end: "bottom bottom",
          scrub: 1,
        },
      });

      // Анимация текста (растворение при приближении)
      gsap.to(".main-text", {
        scale: 2,
        opacity: 0,
        z: 500,
        scrollTrigger: {
          trigger: "body",
          start: "top top",
          end: "20% top",
          scrub: 1,
        },
      });

      // Добавляем индивидуальное вращение каждому гаджету
      document.querySelectorAll(".gadget").forEach((item) => {
        gsap.to(item, {
          rotateY: 360,
          rotateX: 180,
          scrollTrigger: {
            trigger: "body",
            start: "top top",
            end: "bottom bottom",
            scrub: 2,
          },
        });
      });
    </script>
  </body>
</html>
