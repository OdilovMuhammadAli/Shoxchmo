<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NEXUS | THE ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap");
      body {
        background: #000;
        color: #fff;
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
      }

      .section-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transform-style: preserve-3d;
      }

      .huge-text {
        font-size: 25vw;
        line-height: 0.7;
        letter-spacing: -0.06em;
        text-transform: uppercase;
        text-align: center;
        font-weight: 900;
      }

      .media-box {
        width: 70vw;
        height: 40vh;
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
      }

      .exploded-layer {
        position: absolute;
        width: 450px;
        height: 600px;
        border-radius: 24px;
        pointer-events: none;
      }

      .chip-box {
        width: 300px;
        height: 300px;
        background: linear-gradient(135deg, #111, #000);
        border: 2px solid #333;
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .laptop {
        transform-style: preserve-3d;
        width: 500px;
        height: 320px;
      }
      .lid {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        border: 1px solid #333;
        border-radius: 12px;
        transform-origin: bottom;
        transform: rotateX(-90deg);
        overflow: hidden;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border-radius: 30px;
        overflow: hidden;
      }

      .glass-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <nav
      class="fixed top-0 w-full z-[1000] p-10 flex justify-between items-center mix-blend-difference"
    >
      <div class="font-black text-2xl tracking-tighter uppercase">Nexus</div>
      <div
        class="hidden md:flex gap-12 text-[9px] font-bold tracking-[0.5em] uppercase opacity-40"
      >
        <a href="#">Studio</a><a href="#">Performance</a><a href="#">Specs</a>
      </div>
    </nav>

    <div id="main-scroller" style="height: 2000vh">
      <div class="section-container" id="s-intro">
        <h1 class="huge-text italic">PURE<br />FORCE</h1>
      </div>

      <div class="section-container" id="s-explode">
        <div class="relative w-[450px] h-[600px]" id="explode-group">
          <div
            class="exploded-layer bg-zinc-800 border border-white/10"
            id="lay-1"
          ></div>
          <div
            class="exploded-layer flex items-center justify-center bg-blue-600/5 border border-blue-500/20 backdrop-blur-md"
            id="lay-2"
          >
            <div
              class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center font-black"
            >
              M4
            </div>
          </div>
          <div
            class="exploded-layer overflow-hidden border border-white/20"
            id="lay-3"
          >
            <video
              autoplay
              muted
              loop
              playsinline
              class="w-full h-full object-cover"
            >
              <source
                src="https://www.apple.com/105/media/us/ipad-pro/2024/4dcca390-0fca-4933-b1bc-1d13f9694b8e/anim/hero/large_2x.mp4"
                type="video/mp4"
              />
            </video>
          </div>
        </div>
      </div>

      <div class="section-container" id="s-chip">
        <div class="absolute huge-text text-white/[0.03]" id="chip-bg-text">
          M4 MAX
        </div>
        <div class="chip-box" id="chip-model">
          <span class="text-6xl font-black text-amber-500">M4</span>
        </div>
      </div>

      <div class="section-container" id="s-gallery">
        <div class="grid grid-cols-3 gap-8 w-[120vw]" id="gallery-grid">
          <div class="glass-card h-64">
            <img
              src="https://images.unsplash.com/photo-1510557880182-3d4d3cba3f21?q=80&w=2070&auto=format&fit=crop"
            />
          </div>
          <div class="glass-card h-80">
            <img
              src="https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?q=80&w=2030&auto=format&fit=crop"
            />
          </div>
          <div class="glass-card h-64">
            <img
              src="https://images.unsplash.com/photo-1556656793-062ff9878273?q=80&w=2070&auto=format&fit=crop"
            />
          </div>
          <div
            class="glass-card h-96 mt-[-40px] flex items-center justify-center bg-blue-600"
          >
            <h3 class="text-4xl font-black tracking-tighter uppercase italic">
              Stay Next.
            </h3>
          </div>
          <div class="glass-card h-64">
            <img
              src="https://images.unsplash.com/photo-1591337676887-a217a6970c8a?q=80&w=1780&auto=format&fit=crop"
            />
          </div>
          <div class="glass-card h-80 mt-[-20px]">
            <img
              src="https://images.unsplash.com/photo-1616348436168-de43ad0db179?q=80&w=1981&auto=format&fit=crop"
            />
          </div>
        </div>
      </div>

      <div class="section-container" id="s-mac">
        <div class="flex flex-col items-center">
          <div class="laptop">
            <div class="lid" id="mac-lid">
              <video
                autoplay
                muted
                loop
                playsinline
                class="w-full h-full object-cover"
              >
                <source
                  src="https://www.apple.com/105/media/us/macbook-pro/2024/0297072a-92f7-4340-9b0d-7106368d9f10/anim/hero/large_2x.mp4"
                  type="video/mp4"
                />
              </video>
            </div>
            <div
              class="h-3 bg-zinc-800 w-full absolute bottom-[-13px] rounded-b-xl border-t border-white/5"
            ></div>
          </div>
          <h2 class="text-6xl font-black mt-20 italic">MACBOOK PRO</h2>
        </div>
      </div>
    </div>

    <footer
      class="relative z-[1000] bg-black pt-40 pb-10 px-10 border-t border-white/5"
    >
      <div class="max-w-7xl mx-auto flex flex-col items-center text-center">
        <h2
          class="text-[12vw] font-black italic tracking-tighter leading-none mb-12"
        >
          NEXUS.
        </h2>
        <button
          class="bg-white text-black px-16 py-6 rounded-full font-black uppercase text-xs tracking-[0.3em] hover:bg-blue-600 hover:text-white transition-all duration-500"
        >
          Order Now
        </button>
        <p class="mt-20 opacity-20 text-[10px] font-bold tracking-[2em]">
          BEYOND THE FUTURE 2026
        </p>
      </div>
    </footer>

    <script>
      const lenis = new Lenis({ duration: 1.8 });
      function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
      }
      requestAnimationFrame(raf);

      gsap.registerPlugin(ScrollTrigger);
      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: "#main-scroller",
          start: "top top",
          end: "bottom bottom",
          scrub: 1,
        },
      });

      tl.to("#s-intro", { opacity: 1, duration: 1 }).to("#s-intro h1", {
        scale: 15,
        opacity: 0,
        duration: 3,
        ease: "power2.in",
      });

      tl.to("#s-explode", { opacity: 1, duration: 1.5 })
        .from("#lay-1", { z: -1500, opacity: 0, duration: 3 })
        .from("#lay-2", { z: -800, opacity: 0, duration: 3 }, "-=2.5")
        .from("#lay-3", { z: 800, opacity: 0, duration: 3 }, "-=2.5")
        .to("#lay-1", { x: -200, rotateY: -20, duration: 3 }, "+=0.5")
        .to("#lay-3", { x: 200, rotateY: 20, duration: 3 }, "-=3")
        .to("#s-explode", {
          scale: 0.5,
          opacity: 0,
          filter: "blur(20px)",
          duration: 2.5,
        });

      tl.to("#s-chip", { opacity: 1, duration: 1 })
        .from("#chip-model", { scale: 0.2, rotateY: 180, duration: 2 })
        .to("#s-chip", { scale: 10, opacity: 0, duration: 2.5 });

      tl.to("#s-gallery", { opacity: 1, duration: 1 })
        .from("#gallery-grid div", {
          z: -5000,
          opacity: 0,
          stagger: 0.1,
          duration: 3,
        })
        .to("#gallery-grid", { scale: 4, opacity: 0, duration: 3 });

      tl.to("#s-mac", { opacity: 1, duration: 1 })
        .to("#mac-lid", { rotateX: 0, duration: 2.5 })
        .to("#s-mac", { scale: 0.8, opacity: 0, duration: 2, delay: 0.5 });

      window.addEventListener("mousemove", (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        gsap.to(".section-container", { x: x, y: y, duration: 1.5 });
      });
    </script>
  </body>
</html>
