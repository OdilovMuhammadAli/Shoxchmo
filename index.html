<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FOUNDER OS | HORIZONTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap");
      body {
        background: #000;
        color: #fff;
        font-family: "Plus Jakarta Sans", sans-serif;
        overflow-x: hidden;
      }

      /* Фикс только для Hero */
      #s-hero {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        pointer-events: auto;
      }

      .hero-title {
        font-size: clamp(2.4rem, 12vw, 8rem);
        font-weight: 800;
        line-height: 0.9;
        letter-spacing: -0.05em;
        text-transform: uppercase;
        text-align: center;
      }

      .content-flow {
        position: relative;
        z-index: 100;
        background: #000;
        margin-top: 100vh;
        padding: 60px 20px;
      }

      .bento-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 24px;
        width: 100%;
      }

      /* Футер из image_9c36ef.png */
      .footer-logo {
        font-size: 16vw;
        font-weight: 900;
        font-style: italic;
        color: #2563eb;
        opacity: 0.15;
        line-height: 1;
        text-transform: uppercase;
      }

      .input-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 16px;
        border-radius: 12px;
        width: 100%;
        color: #fff;
        font-size: 16px;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="s-hero">
      <div class="flex flex-col items-center px-6 text-center">
        <div
          class="mb-4 text-[9px] font-bold tracking-[0.3em] text-blue-500 uppercase border border-blue-500/20 px-4 py-1.5 rounded-full"
        >
          Build. Scale. Repeat.
        </div>
        <h1 class="hero-title">
          Операционная <br />
          система <br />
          <span class="text-blue-600 italic">роста.</span>
        </h1>
        <button
          onclick="lenis.scrollTo('.content-flow')"
          class="mt-8 bg-white text-black px-10 py-4 rounded-full font-bold uppercase text-[10px] tracking-widest active:scale-95 transition-all"
        >
          Записаться
        </button>
      </div>
    </div>

    <div class="content-flow">
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row gap-10 items-start"
      >
        <div class="w-full md:w-1/2 space-y-4">
          <h2
            class="text-xl font-bold italic uppercase text-blue-600 mb-6 tracking-tighter"
          >
            Модули системы
          </h2>
          <div class="bento-item">
            <h3 class="font-bold text-sm">01 Strategy</h3>
            <p class="text-[11px] text-zinc-500">
              Дорожная карта на 24 месяца.
            </p>
          </div>
          <div class="bento-item bg-blue-600/5">
            <h3 class="font-bold text-sm text-blue-400">02 Growth</h3>
            <p class="text-[11px] text-zinc-500">Механики захвата рынка.</p>
          </div>
          <div class="bento-item">
            <h3 class="font-bold text-sm">03 Product</h3>
            <p class="text-[11px] text-zinc-500">Автономная работа системы.</p>
          </div>
        </div>

        <div class="w-full md:w-1/2 sticky top-24">
          <div class="bento-item bg-zinc-950/50 p-8 md:p-10 border-blue-600/20">
            <h2
              class="text-3xl font-black mb-8 italic uppercase tracking-tighter text-blue-600"
            >
              READY?
            </h2>
            <form class="space-y-4">
              <input type="text" placeholder="Имя" class="input-field" />
              <input type="text" placeholder="Telegram" class="input-field" />
              <textarea
                placeholder="Ваш стартап и цели"
                class="input-field h-32 resize-none"
              ></textarea>
              <button
                type="button"
                class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all"
              >
                ОТПРАВИТЬ ЗАЯВКУ
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <footer
      class="relative z-[200] bg-black pt-24 pb-12 px-6 border-t border-white/5"
    >
      <div class="flex flex-col items-center text-center">
        <div class="footer-logo">FOUNDER OS.</div>
        <p
          class="opacity-20 text-[8px] font-bold tracking-[1.5em] uppercase mt-[-10px]"
        >
          Beyond The Future 2026
        </p>
      </div>
    </footer>

    <script>
      const lenis = new Lenis({ duration: 1.0 });
      function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
      }
      requestAnimationFrame(raf);

      gsap.registerPlugin(ScrollTrigger);

      // Единственный быстрый блюр при уходе Hero
      gsap.to("#s-hero", {
        scrollTrigger: {
          trigger: ".content-flow",
          start: "top bottom",
          end: "top center",
          scrub: 0.5,
        },
        opacity: 0,
        filter: "blur(12px)",
        scale: 0.95,
        pointerEvents: "none",
      });
    </script>
  </body>
</html>
